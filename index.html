    if(filter==='Panjang'&&v.tipe!=='Panjang')return false;
    if(filter==='Shorts'&&v.tipe!=='Shorts')return false;
    if(filter==='tr'&&!v.tr_id)return false;
    if(query&&!v.title.toLowerCase().includes(query))return false;
    return true;
  });
  countEl.textContent=arr.length+' video ditampilkan · '+NTR+'/347 transkrip siap';
  if(!arr.length){list.innerHTML='<div class="empty">Tidak ada video yang cocok.</div>';return;}
  const f=document.createDocumentFragment();
  arr.forEach(v=>{
    const done=studied.has(v.id), hasTr=!!v.tr_id;
    const c=document.createElement('div');c.className='card'+(done?' done':'');
    c.innerHTML=
    '<div class="donebadge">✓ Sudah dipelajari</div>'
    +'<div class="thumb">'
      +'<img loading="lazy" src="https://i.ytimg.com/vi/'+v.id+'/hqdefault.jpg" alt="">'
      +'<div class="play"><span></span></div>'
      +'<div class="rank">#'+v.rank+'</div>'
      +'<div class="typ '+v.tipe+'">'+(v.tipe==='Shorts'?'SHORTS':'VIDEO')+'</div>'
      +(v.dur&&v.dur!=='-'?'<div class="dur">'+v.dur+'</div>':'')
    +'</div>'
    +'<div class="body">'
      +'<div class="title">'+esc(v.title)+'</div>'
      +'<div class="meta">'+v.v+' x ditonton'+(v.umur&&v.umur!=='-'&&v.umur!=='Short'?' · '+v.umur:'')+'</div>'
      +'<div class="row">'
        +'<button class="btn pri act-play">▶ Putar</button>'
        +'<a class="btn" href="'+v.url+'" target="_blank" rel="noopener">↗ YouTube</a>'
        +'<button class="btn act-tr" '+(hasTr?'':'disabled')+'>📄 Transkrip</button>'
      +'</div>'
      +'<button class="donebtn act-done">'+(done?'✓ Sudah dipelajari (ketuk untuk batal)':'Tandai sudah dipelajari')+'</button>'
      +'<div class="panel">'
        +(hasTr?(
           (v.pen?'<div class="pen"><b>Inti video:</b> '+esc(v.pen)+'</div>':'')
           +'<div class="langtoggle"><button class="on" data-l="id">🇮🇩 Indonesia</button><button data-l="en">🇬🇧 English</button></div>'
           +'<div class="tr tr-id">'+esc(v.tr_id)+'</div>'
           +'<div class="tr tr-en" style="display:none">'+esc(v.tr_en||'')+'</div>'
         ):'<div class="note">Transkrip untuk video ini belum tersedia. Sedang ditarik bertahap (otomatis nyusul).</div>')
      +'</div>'
    +'</div>';
    const thumb=c.querySelector('.thumb');
    thumb.addEventListener('click',()=>play(c,v.id));
    c.querySelector('.act-play').addEventListener('click',e=>{e.stopPropagation();play(c,v.id);});
    const panel=c.querySelector('.panel');
    if(hasTr){
      c.querySelector('.act-tr').addEventListener('click',()=>panel.classList.toggle('open'));
      const lt=c.querySelectorAll('.langtoggle button');
      lt.forEach(b=>b.addEventListener('click',()=>{lt.forEach(x=>x.classList.remove('on'));b.classList.add('on');
        c.querySelector('.tr-id').style.display=b.dataset.l==='id'?'block':'none';
        c.querySelector('.tr-en').style.display=b.dataset.l==='en'?'block':'none';}));
    }
    c.querySelector('.act-done').addEventListener('click',()=>{
      if(studied.has(v.id)){studied.delete(v.id);} else {studied.add(v.id);}
      saveStudied();
      if(filter==='belum'||filter==='sudah'){render();} else {
        const isd=studied.has(v.id);
        c.classList.toggle('done',isd);
        c.querySelector('.act-done').textContent=isd?'✓ Sudah dipelajari (ketuk untuk batal)':'Tandai sudah dipelajari';
      }
    });
    f.appendChild(c);
  });
  list.innerHTML='';list.appendChild(f);
}
document.getElementById('q').addEventListener('input',e=>{query=e.target.value.toLowerCase().trim();render();});
document.getElementById('chips').addEventListener('click',e=>{const b=e.target.closest('.chip');if(!b)return;
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));b.classList.add('on');filter=b.dataset.f;render();});
updateProgress();render();
</script>
</body>
</html>
